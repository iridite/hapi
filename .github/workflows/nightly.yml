name: Nightly build (Windows)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Download tunwg
        run: bun run download:tunwg

      - name: Build web assets
        run: bun run build:web

      - name: Embed web assets into hub
        run: cd hub && bun run generate:embedded-web-assets

      - name: Compile Windows x64 exe
        run: cd cli && bun run build:exe:allinone --target bun-windows-x64

      - name: Prepare artifact name
        run: |
          SHA=$(git rev-parse --short HEAD)
          cp cli/dist-exe/bun-windows-x64/hapi.exe hapi-windows-x64-${SHA}.exe
          echo "EXE_NAME=hapi-windows-x64-${SHA}.exe" >> $GITHUB_ENV

      - name: Update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly (latest main)"
          body: |
            Auto-built from `main` @ ${{ github.sha }}

            **Commit:** ${{ github.event.head_commit.message }}

            ### How to update
            Download the `.exe` below, rename to `hapi.exe`, replace `C:\Users\ollama\hapi\hapi.exe`.
          prerelease: true
          files: ${{ env.EXE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}